<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Anchor Computer Trading LLC | 迪拜企业级 IT 硬件供应商</title>
    <!-- 引入图标库 -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root { --primary: #1a2a6c; --accent: #f2a900; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #f8f9fa; color: #333; line-height: 1.6; }
        .header { background: var(--primary); color: white; padding: 60px 20px; text-align: center; }
        
        /* Logo 和 标题的对齐样式 */
        .title-container { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 15px; 
            flex-wrap: wrap; 
        }
        .logo-img { 
            height: 60px; /* 调整 Logo 的高度 */
            width: auto; 
            border-radius: 4px;
        }

        .container { max-width: 800px; margin: -40px auto 40px; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        h1 { margin: 0; font-size: 2.2rem; }
        .tagline { font-size: 1.1rem; opacity: 0.9; margin-top: 10px; }
        .content-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { padding: 20px; border: 1px solid #eee; border-radius: 8px; transition: 0.3s; }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .footer { text-align: center; padding: 20px; font-size: 0.9rem; color: #888; }
    </style>
</head>
<body>

    <div class="header">
        <div class="title-container">
            <!-- 插入你的 Logo 图片 -->
            <img src="黄金锚和电脑.jpg" alt="Logo" class="logo-img">
            <h1>Golden Anchor Computer Trading LLC</h1>
        </div>
        <p class="tagline">迪拜及阿联酋领先的企业级 IT 硬件供应商</p>
    </div>

    <div class="container">
        <h2>专注高端硬件解决方案</h2>
        <p>我们提供授权的处理器、服务器、GPU、网络设备及存储解决方案。</p>
        
        <div class="content-grid">
            <div class="card">
                <i class="fas fa-microchip" style="color:var(--primary); font-size: 2rem;"></i>
                <h3>处理器</h3>
                <p>Intel & AMD</p>
            </div>
            <div class="card">
                <i class="fas fa-desktop" style="color:var(--primary); font-size: 2rem;"></i>
                <h3>显卡</h3>
                <p>NVIDIA & Enterprise GPU</p>
            </div>
            <div class="card">
                <i class="fas fa-network-wired" style="color:var(--primary); font-size: 2rem;"></i>
                <h3>网络设备</h3>
                <p>Cisco & 更多</p>
            </div>
        </div>

        <div style="margin-top: 40px; border-top: 1px solid #eee; padding-top: 20px;">
            <p><strong>联系地址：</strong> Plot No. 768 - Al Sajaa - Sharjah, United Arab Emirates</p>
        </div>
    </div>

    <div class="footer">
        © 2026 Golden Anchor Computer Trading LLC. All Rights Reserved.
    </div>

</body>
</html>
